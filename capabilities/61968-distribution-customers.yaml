naftiko: 1.0.0-alpha2
info:
  label: IEC CIM 61968 Distribution Management API — Customers
  description: 'IEC CIM 61968 Distribution Management API — Customers. 1 operations. Lead operation: List utility customers.
    Self-contained Naftiko capability covering one Iec Cim business surface.'
  tags:
  - Iec Cim
  - Customers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IEC_CIM_API_KEY: IEC_CIM_API_KEY
capability:
  consumes:
  - type: http
    namespace: 61968-distribution-customers
    baseUri: https://dms-gateway.utility.example.com/cim/61968/v1
    description: IEC CIM 61968 Distribution Management API — Customers business capability. Self-contained, no shared references.
    resources:
    - name: customers
      path: /customers
      operations:
      - name: listcustomers
        method: GET
        description: List utility customers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Search query (name or address)
        - name: accountNumber
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.IEC_CIM_API_KEY}}'
  exposes:
  - type: rest
    namespace: 61968-distribution-customers-rest
    port: 8080
    description: REST adapter for IEC CIM 61968 Distribution Management API — Customers. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/customers
      name: customers
      description: REST surface for customers.
      operations:
      - method: GET
        name: listcustomers
        description: List utility customers
        call: 61968-distribution-customers.listcustomers
        with:
          q: rest.q
          accountNumber: rest.accountNumber
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: 61968-distribution-customers-mcp
    port: 9090
    transport: http
    description: MCP adapter for IEC CIM 61968 Distribution Management API — Customers. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-utility-customers
      description: List utility customers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 61968-distribution-customers.listcustomers
      with:
        q: tools.q
        accountNumber: tools.accountNumber
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
