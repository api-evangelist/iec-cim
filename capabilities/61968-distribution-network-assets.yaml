naftiko: 1.0.0-alpha2
info:
  label: IEC CIM 61968 Distribution Management API — Network Assets
  description: 'IEC CIM 61968 Distribution Management API — Network Assets. 2 operations. Lead operation: List network assets.
    Self-contained Naftiko capability covering one Iec Cim business surface.'
  tags:
  - Iec Cim
  - Network Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IEC_CIM_API_KEY: IEC_CIM_API_KEY
capability:
  consumes:
  - type: http
    namespace: 61968-distribution-network-assets
    baseUri: https://dms-gateway.utility.example.com/cim/61968/v1
    description: IEC CIM 61968 Distribution Management API — Network Assets business capability. Self-contained, no shared
      references.
    resources:
    - name: assets
      path: /assets
      operations:
      - name: listassets
        method: GET
        description: List network assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: assetType
          in: query
          type: string
        - name: substationId
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    - name: assets-mRID
      path: /assets/{mRID}
      operations:
      - name: getasset
        method: GET
        description: Get asset by mRID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mRID
          in: path
          type: string
          description: CIM Master Resource Identifier (UUID)
          required: true
    authentication:
      type: bearer
      token: '{{env.IEC_CIM_API_KEY}}'
  exposes:
  - type: rest
    namespace: 61968-distribution-network-assets-rest
    port: 8080
    description: REST adapter for IEC CIM 61968 Distribution Management API — Network Assets. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/assets
      name: assets
      description: REST surface for assets.
      operations:
      - method: GET
        name: listassets
        description: List network assets
        call: 61968-distribution-network-assets.listassets
        with:
          assetType: rest.assetType
          substationId: rest.substationId
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/{mrid}
      name: assets-mrid
      description: REST surface for assets-mRID.
      operations:
      - method: GET
        name: getasset
        description: Get asset by mRID
        call: 61968-distribution-network-assets.getasset
        with:
          mRID: rest.mRID
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: 61968-distribution-network-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for IEC CIM 61968 Distribution Management API — Network Assets. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-network-assets
      description: List network assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 61968-distribution-network-assets.listassets
      with:
        assetType: tools.assetType
        substationId: tools.substationId
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: get-asset-mrid
      description: Get asset by mRID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 61968-distribution-network-assets.getasset
      with:
        mRID: tools.mRID
      outputParameters:
      - type: object
        mapping: $.
