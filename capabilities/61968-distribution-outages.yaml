naftiko: 1.0.0-alpha2
info:
  label: IEC CIM 61968 Distribution Management API — Outages
  description: 'IEC CIM 61968 Distribution Management API — Outages. 2 operations. Lead operation: List outage events. Self-contained
    Naftiko capability covering one Iec Cim business surface.'
  tags:
  - Iec Cim
  - Outages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IEC_CIM_API_KEY: IEC_CIM_API_KEY
capability:
  consumes:
  - type: http
    namespace: 61968-distribution-outages
    baseUri: https://dms-gateway.utility.example.com/cim/61968/v1
    description: IEC CIM 61968 Distribution Management API — Outages business capability. Self-contained, no shared references.
    resources:
    - name: outages
      path: /outages
      operations:
      - name: listoutages
        method: GET
        description: List outage events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: startTime
          in: query
          type: string
        - name: endTime
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    - name: outages-mRID
      path: /outages/{mRID}
      operations:
      - name: getoutage
        method: GET
        description: Get outage details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mRID
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.IEC_CIM_API_KEY}}'
  exposes:
  - type: rest
    namespace: 61968-distribution-outages-rest
    port: 8080
    description: REST adapter for IEC CIM 61968 Distribution Management API — Outages. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/outages
      name: outages
      description: REST surface for outages.
      operations:
      - method: GET
        name: listoutages
        description: List outage events
        call: 61968-distribution-outages.listoutages
        with:
          status: rest.status
          startTime: rest.startTime
          endTime: rest.endTime
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/outages/{mrid}
      name: outages-mrid
      description: REST surface for outages-mRID.
      operations:
      - method: GET
        name: getoutage
        description: Get outage details
        call: 61968-distribution-outages.getoutage
        with:
          mRID: rest.mRID
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: 61968-distribution-outages-mcp
    port: 9090
    transport: http
    description: MCP adapter for IEC CIM 61968 Distribution Management API — Outages. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-outage-events
      description: List outage events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 61968-distribution-outages.listoutages
      with:
        status: tools.status
        startTime: tools.startTime
        endTime: tools.endTime
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-outage-details
      description: Get outage details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 61968-distribution-outages.getoutage
      with:
        mRID: tools.mRID
      outputParameters:
      - type: object
        mapping: $.
