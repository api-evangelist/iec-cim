naftiko: 1.0.0-alpha2
info:
  label: IEC CIM 61968 Distribution Management API — Work Orders
  description: 'IEC CIM 61968 Distribution Management API — Work Orders. 1 operations. Lead operation: List work orders. Self-contained
    Naftiko capability covering one Iec Cim business surface.'
  tags:
  - Iec Cim
  - Work Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IEC_CIM_API_KEY: IEC_CIM_API_KEY
capability:
  consumes:
  - type: http
    namespace: 61968-distribution-work-orders
    baseUri: https://dms-gateway.utility.example.com/cim/61968/v1
    description: IEC CIM 61968 Distribution Management API — Work Orders business capability. Self-contained, no shared references.
    resources:
    - name: work-orders
      path: /work-orders
      operations:
      - name: listworkorders
        method: GET
        description: List work orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: workType
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.IEC_CIM_API_KEY}}'
  exposes:
  - type: rest
    namespace: 61968-distribution-work-orders-rest
    port: 8080
    description: REST adapter for IEC CIM 61968 Distribution Management API — Work Orders. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/work-orders
      name: work-orders
      description: REST surface for work-orders.
      operations:
      - method: GET
        name: listworkorders
        description: List work orders
        call: 61968-distribution-work-orders.listworkorders
        with:
          status: rest.status
          workType: rest.workType
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: 61968-distribution-work-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for IEC CIM 61968 Distribution Management API — Work Orders. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-work-orders
      description: List work orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 61968-distribution-work-orders.listworkorders
      with:
        status: tools.status
        workType: tools.workType
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
