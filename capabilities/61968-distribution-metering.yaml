naftiko: 1.0.0-alpha2
info:
  label: IEC CIM 61968 Distribution Management API — Metering
  description: 'IEC CIM 61968 Distribution Management API — Metering. 2 operations. Lead operation: List meters. Self-contained
    Naftiko capability covering one Iec Cim business surface.'
  tags:
  - Iec Cim
  - Metering
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IEC_CIM_API_KEY: IEC_CIM_API_KEY
capability:
  consumes:
  - type: http
    namespace: 61968-distribution-metering
    baseUri: https://dms-gateway.utility.example.com/cim/61968/v1
    description: IEC CIM 61968 Distribution Management API — Metering business capability. Self-contained, no shared references.
    resources:
    - name: meters
      path: /meters
      operations:
      - name: listmeters
        method: GET
        description: List meters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: substationId
          in: query
          type: string
        - name: feeder
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    - name: meters-mRID-readings
      path: /meters/{mRID}/readings
      operations:
      - name: getmeterreadings
        method: GET
        description: Get meter readings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mRID
          in: path
          type: string
          required: true
        - name: startTime
          in: query
          type: string
          description: Reading period start (ISO 8601)
          required: true
        - name: endTime
          in: query
          type: string
          description: Reading period end
          required: true
        - name: readingType
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.IEC_CIM_API_KEY}}'
  exposes:
  - type: rest
    namespace: 61968-distribution-metering-rest
    port: 8080
    description: REST adapter for IEC CIM 61968 Distribution Management API — Metering. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/meters
      name: meters
      description: REST surface for meters.
      operations:
      - method: GET
        name: listmeters
        description: List meters
        call: 61968-distribution-metering.listmeters
        with:
          substationId: rest.substationId
          feeder: rest.feeder
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meters/{mrid}/readings
      name: meters-mrid-readings
      description: REST surface for meters-mRID-readings.
      operations:
      - method: GET
        name: getmeterreadings
        description: Get meter readings
        call: 61968-distribution-metering.getmeterreadings
        with:
          mRID: rest.mRID
          startTime: rest.startTime
          endTime: rest.endTime
          readingType: rest.readingType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: 61968-distribution-metering-mcp
    port: 9090
    transport: http
    description: MCP adapter for IEC CIM 61968 Distribution Management API — Metering. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-meters
      description: List meters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 61968-distribution-metering.listmeters
      with:
        substationId: tools.substationId
        feeder: tools.feeder
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-meter-readings
      description: Get meter readings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 61968-distribution-metering.getmeterreadings
      with:
        mRID: tools.mRID
        startTime: tools.startTime
        endTime: tools.endTime
        readingType: tools.readingType
      outputParameters:
      - type: object
        mapping: $.
