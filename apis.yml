apis:
- aid: iec-cim:iec-cim-61968-distribution-api
  name: IEC CIM 61968 Distribution Management API
  tags:
  - Utilities
  - Energy
  - Distribution
  - CIM
  - XML
  - Smart Grid
  image: https://raw.githubusercontent.com/api-evangelist/iec-cim/refs/heads/main/image.png
  humanURL: https://www.iec.ch/
  baseURL: https://ami-gateway.utility.example.com/cim/61968
  properties:
  - url: https://www.iec.ch/
    type: Documentation
  - url: https://cimug.ucaiug.org/
    type: Reference
  description: >-
    The IEC CIM 61968 standard defines interfaces for distribution management systems (DMS), enabling integration of outage management, network management, meter reading, and work management systems using CIM XML message exchange.

- aid: iec-cim:iec-cim-61970-ems-api
  name: IEC CIM 61970 Energy Management API
  tags:
  - Utilities
  - Energy
  - Transmission
  - CIM
  - XML
  - EMS
  image: https://raw.githubusercontent.com/api-evangelist/iec-cim/refs/heads/main/image.png
  humanURL: https://www.iec.ch/
  baseURL: https://ems-gateway.utility.example.com/cim/61970
  properties:
  - url: https://www.iec.ch/
    type: Documentation
  - url: https://cimug.ucaiug.org/
    type: Reference
  description: >-
    The IEC CIM 61970 standard defines the Common Information Model for energy management systems (EMS), enabling data exchange for power system network models, measurements, and topology across transmission utility systems.

- aid: iec-cim:iec-cim-ami-smart-meter-api
  name: IEC CIM AMI Smart Meter API
  tags:
  - Utilities
  - Energy
  - Smart Meter
  - AMI
  - CIM
  - XML
  - Metering
  image: https://raw.githubusercontent.com/api-evangelist/iec-cim/refs/heads/main/image.png
  humanURL: https://www.iec.ch/
  baseURL: https://ami-gateway.utility.example.com/cim
  properties:
  - url: https://www.iec.ch/
    type: Documentation
  - url: https://cimug.ucaiug.org/
    type: Reference
  description: >-
    The IEC CIM AMI (Advanced Metering Infrastructure) APIs from AMI head-end systems provide smart meter readings, interval data, usage points, and demand response signals using CIM XML data models compliant with IEC 61968-9 for utility grid operations.

common:
  aid: iec-cim
  name: IEC CIM (Common Information Model)
  description: >-
    The IEC Common Information Model (CIM) standards (IEC 61968/61970) define data models and interfaces for electric utility systems including distribution management, energy management, and advanced metering infrastructure. The CIM User Group (CIMug) maintains open-source tools including CIMTool for working with CIM profiles and data exchange.
  image: https://raw.githubusercontent.com/api-evangelist/iec-cim/refs/heads/main/image.png
